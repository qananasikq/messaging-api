services:

  api:
    build: .
    container_name: messaging-api-api
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: dev-secret
      REDIS_ADDR: redis:6379
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/messaging?sslmode=disable
    depends_on:
      - postgres
      - redis

  web:
    image: node:20
    container_name: messaging-api-web
    working_dir: /app
    volumes:
      - ./web:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    depends_on:
      - api

  postgres:
    image: postgres:16
    container_name: messaging-api-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: messaging
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: messaging-api-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata: